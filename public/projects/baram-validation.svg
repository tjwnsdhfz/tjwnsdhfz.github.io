    <g transform="translate(760)">
      <rect width="178" height="108" fill="#f5f5f7" stroke="#f5f5f7"/>
      <text x="18" y="34" fill="#bf5b00" font-size="13" letter-spacing="2">G4 · REVIEW</text>
      <text x="18" y="70" fill="#1d1d1f" font-size="17" font-weight="600">독립 감사 보강</text>
