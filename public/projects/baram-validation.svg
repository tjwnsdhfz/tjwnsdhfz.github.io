      <rect width="178" height="108" fill="#2c2c2e" stroke="#424245"/>
      <text x="18" y="34" fill="#8e8e93" font-size="13" letter-spacing="2">G5 · LOCKED</text>
      <text x="18" y="70" fill="#f5f5f7" font-size="17" font-weight="600">One-shot</text>
