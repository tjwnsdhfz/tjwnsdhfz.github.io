    <text x="110" y="348" fill="#2997ff" font-size="14">CURRENT DECISION</text>
    <text x="110" y="389" fill="#f5f5f7" font-size="21">G4 FAIL items are visible.</text>
    <text x="110" y="420" fill="#a1a1a6" font-size="15">No holdout claim until the audit passes.</text>
