<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">BARAM 2026 engineering validation gates</title>
  <desc id="desc">A dark technical diagram showing data contracts, time-series forecasts, G0 through G6 quality gates, G4 under review, and the 2024 holdout locked.</desc>
  <rect width="1600" height="1000" fill="#1d1d1f"/>
  <g stroke="#3a3a3c" stroke-width="1">
    <path d="M80 150H1520M80 270H1520M80 390H1520M80 510H1520M80 630H1520M80 750H1520M80 870H1520"/>
    <path d="M200 100V900M400 100V900M600 100V900M800 100V900M1000 100V900M1200 100V900M1400 100V900"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="#f5f5f7">
    <text x="84" y="88" font-size="24" font-weight="600" letter-spacing="4">BARAM 2026 · ENGINEERING DATA QA</text>
    <text x="84" y="135" font-size="16" fill="#a1a1a6">Wind-power forecasting · leakage-safe validation · reproducible evidence</text>
    <text x="1280" y="88" font-size="15" fill="#2997ff" letter-spacing="2">ACTIVE REVIEW</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M90 585 C180 560 230 610 320 540 S470 470 560 520 S720 620 820 505 S990 405 1090 470 S1240 555 1510 360" stroke="#8e8e93" stroke-width="5"/>
    <path d="M90 620 C180 595 235 650 330 575 S485 510 575 555 S715 655 830 535 S995 450 1100 510 S1250 585 1510 405" stroke="#2997ff" stroke-width="7"/>
    <path d="M90 700H1510" stroke="#f5f5f7" stroke-width="2" stroke-dasharray="8 12" opacity=".55"/>
  </g>
  <g font-family="ui-monospace,'SFMono-Regular',Consolas,monospace" font-size="15">
    <text x="84" y="735" fill="#a1a1a6">LOCKED 2024 HOLDOUT — NOT OPENED</text>
    <text x="1294" y="348" fill="#a1a1a6">FORECAST</text>
    <text x="1294" y="394" fill="#2997ff">OBSERVED</text>
  </g>
  <g transform="translate(84 785)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g>
      <rect width="178" height="108" fill="#2c2c2e" stroke="#424245"/>
      <text x="18" y="34" fill="#30d158" font-size="13" letter-spacing="2">G0 · PASS</text>
      <text x="18" y="70" fill="#f5f5f7" font-size="17" font-weight="600">환경·Metric</text>
    </g>
    <g transform="translate(190)">
      <rect width="178" height="108" fill="#2c2c2e" stroke="#424245"/>
      <text x="18" y="34" fill="#30d158" font-size="13" letter-spacing="2">G1 · PASS</text>
      <text x="18" y="70" fill="#f5f5f7" font-size="17" font-weight="600">데이터 계약</text>
    </g>
    <g transform="translate(380)">
      <rect width="178" height="108" fill="#2c2c2e" stroke="#424245"/>
      <text x="18" y="34" fill="#30d158" font-size="13" letter-spacing="2">G2 · PASS</text>
      <text x="18" y="70" fill="#f5f5f7" font-size="17" font-weight="600">공식 Baseline</text>
    </g>
    <g transform="translate(570)">
      <rect width="178" height="108" fill="#2c2c2e" stroke="#424245"/>
      <text x="18" y="34" fill="#30d158" font-size="13" letter-spacing="2">G3 · PASS</text>
      <text x="18" y="70" fill="#f5f5f7" font-size="17" font-weight="600">후보 승인</text>
